<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fruit Classifier</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
            color: white;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ff5e62;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ffe3e3;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            max-width: 100%;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🍎 Fruit Classifier 🍊</h1>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" id="fileInput" required><br>
            <button type="submit">Predict</button>
        </form>

        <img id="preview" />

        {% if prediction %}
        <div class="result">
            {{ prediction }} <br>
            Confidence: {{ confidence }}%
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById("fileInput").onchange = function (e) {
            const [file] = e.target.files;
            if (file) {
                document.getElementById("preview").src = URL.createObjectURL(file);
            }
        };
    </script>

</body>

</html>
